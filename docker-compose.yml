# ============================================================
# RetainIQ — Full Local Stack
# App + Data (PostgreSQL, Redis, Kafka) + Observability (Prometheus, Grafana, Tempo, Loki, OTel Collector)
# Usage: docker compose up -d
# Grafana: http://localhost:3000 (admin/admin)
# Prometheus: http://localhost:9090
# App: http://localhost:8080
# ============================================================

services:

  # ── Application ──────────────────────────────────────────
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: retainiq
      DB_USER: retainiq
      DB_PASSWORD: retainiq
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: "local-dev-secret-must-be-at-least-256-bits-long-for-hmac-sha!!"
      HMAC_SECRET: "local-dev-hmac-secret"
      # OpenTelemetry
      OTEL_SERVICE_NAME: retainiq
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_TRACES_SAMPLER: always_on
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      JAVA_OPTS: >-
        -XX:+UseZGC -XX:+ZGenerational
        -Xms512m -Xmx1g
        -XX:+ExitOnOutOfMemoryError
        -Dreactor.netty.ioWorkerCount=4
        -Dio.netty.leakDetection.level=disabled
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '2'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      otel-collector:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "retainiq-app"

  # ── Data Stores ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: retainiq
      POSTGRES_USER: retainiq
      POSTGRES_PASSWORD: retainiq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retainiq"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper

  # ── Observability: Metrics ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    restart: unless-stopped

  # ── Observability: Dashboards ────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor tempoSearch tempoServiceGraph
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  # ── Observability: Distributed Tracing ───────────────────
  tempo:
    image: grafana/tempo:2.5.0
    ports:
      - "3200:3200"   # Tempo HTTP API
      - "4317:4317"   # OTLP gRPC (direct, bypasses collector)
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    restart: unless-stopped

  # ── Observability: Log Aggregation ───────────────────────
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/loki.yml"]
    restart: unless-stopped

  # ── Observability: OpenTelemetry Collector ───────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    ports:
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./observability/otel/otel-collector.yml:/etc/otelcol/config.yaml:ro
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      - tempo
      - loki
    restart: unless-stopped

  # ── Observability: Exporters ─────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://retainiq:retainiq@postgres:5432/retainiq?sslmode=disable"
    depends_on:
      - postgres

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    ports:
      - "9308:9308"
    command: ["--kafka.server=kafka:9092"]
    depends_on:
      - kafka

  # ── Observability: Log Shipping ──────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
  tempo-data:
  loki-data:
