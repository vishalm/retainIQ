server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers with the retainiq label
      - source_labels: ["__meta_docker_container_name"]
        regex: ".*retainiq.*|.*app.*"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      # Parse JSON logs from Spring Boot
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            thread: thread
            logger: logger
            tenant: tenantId
            trace: traceId
      - labels:
          level:
          service:
          tenant:
          trace:
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000Z07:00"
