<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="100%" role="img" aria-label="RetainIQ Product Flow — Animated">
  <defs>
    <style>
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes slideRight { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: 0; } }
      @keyframes glow { 0%,100% { filter: drop-shadow(0 0 4px rgba(14,165,233,0)); } 50% { filter: drop-shadow(0 0 12px rgba(14,165,233,0.6)); } }
      @keyframes countUp { from { opacity: 0; } to { opacity: 1; } }
      @keyframes flowDot { 0% { offset-distance: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
      .stage { animation: fadeIn 0.5s ease-out both; }
      .stage1 { animation-delay: 0.2s; }
      .stage2 { animation-delay: 0.6s; }
      .stage3 { animation-delay: 1.0s; }
      .stage4 { animation-delay: 1.4s; }
      .stage5 { animation-delay: 1.8s; }
      .result { animation: fadeIn 0.6s ease-out 2.2s both; }
      .title { animation: fadeIn 0.4s ease-out both; }
      .connector { stroke-dasharray: 200; stroke-dashoffset: 200; animation: dash 1s ease-out 0.4s forwards; }
      .connector2 { animation-delay: 0.8s; }
      .connector3 { animation-delay: 1.2s; }
      .connector4 { animation-delay: 1.6s; }
      .connector5 { animation-delay: 2.0s; }
      .retainiq-box { animation: glow 3s ease-in-out 2.5s infinite; }
      .latency { animation: pulse 2s ease-in-out 2.5s infinite; }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text class="title" x="500" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="22" font-weight="700">How RetainIQ Works — The 200ms Decision</text>
  <text class="title" x="500" y="62" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">Subscriber signals in → ranked, compliant, margin-aware offers out</text>

  <!-- Left: Subscriber Signal -->
  <g class="stage stage1">
    <rect x="30" y="100" width="160" height="100" fill="#1e293b" stroke="#475569" rx="8"/>
    <text x="110" y="130" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Subscriber</text>
    <text x="110" y="152" text-anchor="middle" fill="#f87171" font-family="system-ui,sans-serif" font-size="11">"I want to cancel"</text>
    <text x="110" y="172" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">frustration: 0.85</text>
    <text x="110" y="188" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">4 contacts in 30d</text>
  </g>

  <!-- Arrow 1 -->
  <path class="connector" d="M 190 150 L 240 150" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>

  <!-- Stage 1: Enrich -->
  <g class="stage stage1">
    <rect x="240" y="90" width="130" height="56" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="1.5" rx="6"/>
    <text x="305" y="114" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="11" font-weight="600">1. ENRICH</text>
    <text x="305" y="132" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">&lt; 20ms</text>
  </g>

  <!-- Arrow 2 -->
  <path class="connector connector2" d="M 370 118 L 400 118" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>

  <!-- Stage 2: Score -->
  <g class="stage stage2">
    <rect x="400" y="90" width="130" height="56" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="1.5" rx="6"/>
    <text x="465" y="114" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="11" font-weight="600">2. CHURN SCORE</text>
    <text x="465" y="132" text-anchor="middle" fill="#f87171" font-family="system-ui,sans-serif" font-size="10">0.73 HIGH</text>
  </g>

  <!-- Arrow 3 -->
  <path class="connector connector3" d="M 530 118 L 560 118" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>

  <!-- Stage 3: Candidacy -->
  <g class="stage stage3">
    <rect x="560" y="90" width="130" height="56" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="1.5" rx="6"/>
    <text x="625" y="114" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="11" font-weight="600">3. ELIGIBILITY</text>
    <text x="625" y="132" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">6 eligible offers</text>
  </g>

  <!-- Arrow 4 -->
  <path class="connector connector4" d="M 690 118 L 720 118" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>

  <!-- Stage 4: Rank -->
  <g class="stage stage4">
    <rect x="720" y="90" width="130" height="56" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="1.5" rx="6"/>
    <text x="785" y="114" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="11" font-weight="600">4. RANK</text>
    <text x="785" y="132" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">retention x margin</text>
  </g>

  <!-- Arrow 5 -->
  <path class="connector connector5" d="M 850 118 L 880 118" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>

  <!-- Stage 5: Assemble -->
  <g class="stage stage5">
    <rect x="880" y="90" width="90" height="56" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="1.5" rx="6"/>
    <text x="925" y="114" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="11" font-weight="600">5. RESPOND</text>
    <text x="925" y="132" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">&lt; 20ms</text>
  </g>

  <!-- Latency badge -->
  <g class="latency">
    <rect x="420" y="155" width="200" height="28" fill="#0ea5e9" rx="14" opacity="0.15"/>
    <text x="520" y="174" text-anchor="middle" fill="#0ea5e9" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Total: under 200ms p99</text>
  </g>

  <!-- Result: Ranked Offers -->
  <g class="result">
    <rect x="80" y="220" width="840" height="280" fill="#111827" stroke="#1f2937" rx="10"/>
    <text x="500" y="252" text-anchor="middle" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Response: 3 Ranked Offers</text>

    <!-- Offer 1 -->
    <rect x="110" y="270" width="250" height="210" fill="#0f2b1d" stroke="#22c55e" stroke-width="1.5" rx="8">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.4s" fill="freeze"/>
    </rect>
    <rect x="110" y="270" width="250" height="32" fill="#22c55e" rx="8"/>
    <rect x="110" y="290" width="250" height="12" fill="#0f2b1d"/>
    <text x="125" y="292" fill="#0f2b1d" font-family="system-ui,sans-serif" font-size="13" font-weight="700">#1 BEST MATCH</text>
    <text x="125" y="325" fill="#4ade80" font-family="monospace" font-size="12" font-weight="600">VAS-FAMILY-PLAN</text>
    <text x="125" y="345" fill="#d1d5db" font-family="system-ui,sans-serif" font-size="11">Family Plan — Add 3 Lines</text>
    <text x="125" y="370" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Retention: 80%</text>
    <text x="125" y="386" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Margin: AED 20.00/mo</text>
    <text x="125" y="410" fill="#6b7280" font-family="system-ui,sans-serif" font-size="9" font-style="italic">"I can add 3 family lines at 50% off</text>
    <text x="125" y="424" fill="#6b7280" font-family="system-ui,sans-serif" font-size="9" font-style="italic">for 12 months..."</text>
    <rect x="125" y="440" width="90" height="22" fill="#22c55e" rx="4" opacity="0.2"/>
    <text x="170" y="455" text-anchor="middle" fill="#22c55e" font-family="system-ui,sans-serif" font-size="9" font-weight="600">CONSENT REQ</text>

    <!-- Offer 2 -->
    <rect x="380" y="270" width="250" height="210" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5" rx="8">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.7s" fill="freeze"/>
    </rect>
    <rect x="380" y="270" width="250" height="32" fill="#3b82f6" rx="8"/>
    <rect x="380" y="290" width="250" height="12" fill="#1a1a2e"/>
    <text x="395" y="292" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">#2</text>
    <text x="395" y="325" fill="#93c5fd" font-family="monospace" font-size="12" font-weight="600">VAS-STREAM-PLUS</text>
    <text x="395" y="345" fill="#d1d5db" font-family="system-ui,sans-serif" font-size="11">StreamPlus 3-month free trial</text>
    <text x="395" y="370" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Retention: 95%</text>
    <text x="395" y="386" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Margin: AED 12.50/mo</text>
    <text x="395" y="410" fill="#6b7280" font-family="system-ui,sans-serif" font-size="9" font-style="italic">"Free for 3 months, then AED 29/mo.</text>
    <text x="395" y="424" fill="#6b7280" font-family="system-ui,sans-serif" font-size="9" font-style="italic">Cancel anytime."</text>
    <rect x="395" y="440" width="100" height="22" fill="#3b82f6" rx="4" opacity="0.2"/>
    <text x="445" y="455" text-anchor="middle" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="9" font-weight="600">24h COOLING OFF</text>

    <!-- Offer 3 -->
    <rect x="650" y="270" width="250" height="210" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5" rx="8">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.0s" fill="freeze"/>
    </rect>
    <rect x="650" y="270" width="250" height="32" fill="#8b5cf6" rx="8"/>
    <rect x="650" y="290" width="250" height="12" fill="#1a1a2e"/>
    <text x="665" y="292" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">#3</text>
    <text x="665" y="325" fill="#c4b5fd" font-family="monospace" font-size="12" font-weight="600">VAS-ROAM-FREE</text>
    <text x="665" y="345" fill="#d1d5db" font-family="system-ui,sans-serif" font-size="11">Free GCC Roaming 30 days</text>
    <text x="665" y="370" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Retention: 85%</text>
    <text x="665" y="386" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Margin: AED 15.00/mo</text>
    <text x="665" y="410" fill="#6b7280" font-family="system-ui,sans-serif" font-size="9" font-style="italic">"Free GCC roaming for 30 days.</text>
    <text x="665" y="424" fill="#6b7280" font-family="system-ui,sans-serif" font-size="9" font-style="italic">Auto-renews at AED 49/mo."</text>
    <rect x="665" y="440" width="90" height="22" fill="#8b5cf6" rx="4" opacity="0.2"/>
    <text x="710" y="455" text-anchor="middle" fill="#8b5cf6" font-family="system-ui,sans-serif" font-size="9" font-weight="600">CONSENT REQ</text>
  </g>
</svg>
