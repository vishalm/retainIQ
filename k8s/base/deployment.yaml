apiVersion: apps/v1
kind: Deployment
metadata:
  name: retainiq-decisioning
  namespace: retainiq
  labels:
    app: retainiq
    component: decisioning
spec:
  replicas: 3
  selector:
    matchLabels:
      app: retainiq
      component: decisioning
  template:
    metadata:
      labels:
        app: retainiq
        component: decisioning
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: retainiq
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: decisioning
          image: retainiq/decisioning:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: retainiq-db
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: retainiq-db
                  key: password
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: retainiq-redis
                  key: host
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: retainiq-jwt
                  key: secret
            - name: JAVA_OPTS
              value: "-XX:+UseZGC -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
